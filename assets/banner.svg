<svg width="100%" height="280" viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0b1a3a"/>
    </linearGradient>
    <radialGradient id="planet" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7dd3fc"/>
      <stop offset="60%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0b1a3a"/>
    </radialGradient>
    <clipPath id="typeClip">
      <rect x="0" y="0" height="40" width="0">
        <animate attributeName="width" from="0" to="640" begin="0.6s" dur="2.4s" fill="freeze" calcMode="linear"/>
      </rect>
    </clipPath>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e3a8a" stroke-width="0.4" opacity="0.35"/>
    </pattern>
  </defs>

  <rect width="1200" height="280" fill="url(#bg)"/>
  <rect width="1200" height="280" fill="url(#grid)"/>

  <!-- estrelas piscando -->
  <g fill="#e2e8f0">
    <circle cx="90" cy="40" r="1.6"><animate attributeName="opacity" values="0.1;1;0.1" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="90" r="1.2"><animate attributeName="opacity" values="1;0.1;1" dur="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="30" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="60" cy="180" r="1.3"><animate attributeName="opacity" values="1;0.2;1" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="1000" cy="50" r="1.5"><animate attributeName="opacity" values="0.1;1;0.1" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="120" r="1.2"><animate attributeName="opacity" values="1;0.2;1" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="950" cy="220" r="1.4"><animate attributeName="opacity" values="0.2;1;0.2" dur="4.2s" repeatCount="indefinite"/></circle>
    <circle cx="1150" cy="200" r="1.1"><animate attributeName="opacity" values="1;0.1;1" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="230" r="1.2"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- planeta + orbita com satelite -->
  <g transform="translate(1040,140)">
    <circle r="26" fill="url(#planet)"/>
    <ellipse rx="70" ry="26" fill="none" stroke="#3b82f6" stroke-width="1" opacity="0.45"/>
    <circle r="4" fill="#93c5fd">
      <animateMotion dur="6s" repeatCount="indefinite" path="M 70 0 A 70 26 0 1 1 -70 0 A 70 26 0 1 1 70 0"/>
    </circle>
  </g>

  <!-- titulo -->
  <text x="70" y="130" font-family="'Courier New', monospace" font-size="52" font-weight="bold" fill="#f1f5f9" letter-spacing="4">LUANA ALMEIDA</text>

  <!-- subtitulo com efeito de digitacao -->
  <g clip-path="url(#typeClip)" transform="translate(70,160)">
    <text x="0" y="30" font-family="'Courier New', monospace" font-size="22" fill="#60a5fa">&gt; building software for aerospace systems</text>
  </g>
  <rect x="705" y="163" width="11" height="26" fill="#60a5fa">
    <animate attributeName="opacity" values="1;0;1" dur="0.9s" repeatCount="indefinite" begin="0.6s"/>
    <animate attributeName="x" from="70" to="705" begin="0.6s" dur="2.4s" fill="freeze" calcMode="linear"/>
  </rect>
</svg>
